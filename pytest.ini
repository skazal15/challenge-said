[pytest]
testpaths = tests
markers =
    unit: Unit tests — fast, isolated, no external dependencies
    integration: Integration tests — use mocked AWS services (Moto)
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:dash -p no:web3 -p no:ddtrace -p no:ddtrace.pytest_bdd
