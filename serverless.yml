service: python-coding-challenge

provider:
  name: aws
  runtime: python3.9
  region: ap-southeast-2
  environment:
    BOOKS_TABLE: ${self:service}-books-table
  # Least Privilege: only grant actions the code actually uses
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
      Resource:
        - Fn::GetAtt: [BooksTable, Arn]

functions:
  bookApi:
    handler: src.handler.handler
    description: "Book Management REST API — FastAPI on Lambda via Mangum"
    timeout: 10
    memorySize: 256
    events:
      - http:
          path: /{proxy+}
          method: any
      - http:
          path: /
          method: any

resources:
  Resources:
    BooksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.BOOKS_TABLE}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true
