service: python-coding-challenge

provider:
  name: aws
  runtime: python3.9
  region: ap-southeast-2
  environment:
    BOOKS_TABLE: ${self:service}-books-table

functions:
  api:
    handler: src.handler.handler
    events:
      - http:
          path: /{proxy+}
          method: any
      - http:
          path: /
          method: any

resources:
  Resources:
    BooksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.BOOKS_TABLE}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true
